<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운동 스케줄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" style="display:flex">
    <h1>💪 운동 스케줄</h1>
    <p>로그인하면 어떤 기기에서도 데이터가 동기화됩니다</p>
    <div class="login-card">
      <button id="btn-google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        구글로 로그인
      </button>
      <div class="login-divider">또는</div>
      <input type="email" id="input-email" placeholder="이메일">
      <input type="password" id="input-password" placeholder="비밀번호">
      <button id="btn-email-login" class="btn-primary">로그인</button>
      <button id="btn-signup" class="btn-ghost">회원가입</button>
    </div>
  </div>

  <!-- 앱 화면 -->
  <div id="app-screen" style="display:none">
    <header>
      <h1>💪 운동 스케줄</h1>
      <button id="btn-logout" class="btn-danger btn-sm">로그아웃</button>
    </header>

    <!-- 날짜 -->
    <div class="card">
      <span id="today-label"></span>
    </div>

    <!-- 오늘의 운동 -->
    <div class="card">
      <div class="card-title">오늘의 운동</div>
      <div class="progress-wrap">
        <span id="progress-text">0 / 6 완료</span>
        <div class="progress-bg"><div id="progress-bar"></div></div>
      </div>
      <ul id="exercise-list"></ul>
    </div>

    <!-- 몸무게 기록 -->
    <div class="card">
      <div class="card-title">몸무게 기록</div>
      <div id="weight-display">몸무게를 기록해보세요</div>
      <div class="weight-input-row">
        <input type="number" id="weight-input" placeholder="kg 입력" step="0.1" min="20" max="300">
        <button id="btn-save-weight" class="btn-primary btn-sm">저장</button>
      </div>
      <table id="weight-table">
        <thead><tr><th>날짜</th><th>몸무게</th></tr></thead>
        <tbody id="weight-tbody"></tbody>
      </table>
    </div>

    <!-- 메모 -->
    <div class="card">
      <div class="card-title">운동 메모</div>
      <textarea id="memo-input" placeholder="오늘의 운동 기록을 남겨보세요..."></textarea>
    </div>

    <!-- 달력 -->
    <div class="card">
      <div class="cal-header">
        <button id="btn-prev-month" class="btn-ghost btn-sm">◀</button>
        <span id="cal-title"></span>
        <button id="btn-next-month" class="btn-ghost btn-sm">▶</button>
      </div>
      <div class="cal-days-label">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendar"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
